<template>
    <div class="slds-var-p-around_medium">
        <!-- Hero Banner -->
        <div class="welcome-hero">
            <div class="welcome-avatar">
                <lightning-avatar variant="circle" src={userAvatar} initials="G"
                    fallback-icon-name="standard:person_account"
                    alternative-text="Guest">
                </lightning-avatar>
            </div>
            <h1 class="welcome-greeting">{personalizedMessage}</h1>
            <p class="welcome-subtitle">
                We're excited to have you here and support your mental wellness journey.
            </p>
        </div>

        <!-- App Introduction Section -->
        <div class="slds-box slds-theme_default slds-var-m-top_medium">
            <h2 class="slds-text-heading_medium slds-var-m-bottom_small">
                <lightning-icon icon-name="standard:skill" size="small"
                    class="slds-var-m-right_x-small"></lightning-icon>
                {appIntroduction.title}
            </h2>

            <p class="slds-text-body_regular slds-var-m-bottom_medium">
                {appIntroduction.description}
            </p>

            <h3 class="slds-text-heading_small slds-var-m-bottom_small">
                What you can do with Mind Mentor:
            </h3>

            <div class="features-grid">
                <template for:each={appIntroduction.features} for:item="feature">
                    <div key={feature.label} class="feature-card">
                        <div class="feature-card-icon">
                            <lightning-icon icon-name={feature.icon} size="small"></lightning-icon>
                        </div>
                        <p class="slds-text-body_regular">{feature.label}</p>
                    </div>
                </template>
            </div>

            <div class="welcome-cta">
                <lightning-button variant="brand" label="Get Started"
                    class="slds-var-m-right_small" onclick={handleGetStarted}>
                </lightning-button>
                <lightning-button variant="neutral" label="Learn More">
                </lightning-button>
            </div>
        </div>
    </div>
</template>
